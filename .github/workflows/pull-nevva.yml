name: Pull NEVVA module from electro-cuisine-agent
on:
  workflow_dispatch: {}
  schedule:
    - cron: '0/5 * * * *'

permissions:
  contents: write

jobs:
  pull:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Pull nevva_planner from source
        env:
          SRC_TOKEN: ${{ secrets.SECRET }}
        run: |
          set -euo pipefail
          git config user.name  "nevva-sync[bot]"
          git config user.email "sync@electro-cuisine.be"
          src="https://x-access-token:${SRC_TOKEN}@github.com/Volkanb42/electro-cuisine-agent.git"
          tmp="$(mktemp -d)"
          git clone --depth 1 --branch staging "$src" "$tmp"
          rm -rf ./nevva_planner
          cp -r "$tmp/odoo_module/nevva_planner" ./nevva_planner
          find . -name __pycache__ -type d -prune -exec rm -rf {} + 2>/dev/null || true
          find . -name '*.pyc' -delete 2>/dev/null || true
          git add nevva_planner
          git diff --cached --quiet && { echo "değişiklik yok"; exit 0; }
          git commit -m "Pull NEVVA module from electro-cuisine-agent"
          for i in 1 2 3 4 5; do
            git pull --rebase origin "$(git rev-parse --abbrev-ref HEAD)" && git push && exit 0
            echo "push attempt $i failed, retrying..."
            sleep $((RANDOM % 5 + 2))
          done
          echo "push failed after retries"; exit 1
